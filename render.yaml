services:
  - type: web
    name: designscape-api
    runtime: node
    plan: free
    region: oregon
    # Repo root must be the backend folder (package.json at top level).
    # In Render dashboard: Root Directory = leave BLANK. Do NOT set to "src".
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false
